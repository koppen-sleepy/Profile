<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こっぺん すりーぴー Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
        }
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .slide-in {
            opacity: 0;
            transform: translateX(-20px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
        .slide-in.visible {
            opacity: 1;
            transform: translateX(0);
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-rotate {
            animation: rotate 10s linear infinite;
        }
        @keyframes pulse-custom {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-custom {
            animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="text-white selection:bg-purple-500/30 overflow-x-hidden">
    <!-- Background Atmosphere -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-900/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-900/10 blur-[150px] rounded-full"></div>
    </div>

    <main class="relative z-10 max-w-md mx-auto px-6 pt-16 pb-24">
        <!-- Profile Header -->
        <header id="header" class="text-center mb-12 fade-in">
            <div class="relative inline-block mb-6" id="icon-container">
                <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-purple-600 to-blue-600 p-[2px] animate-pulse-custom">
                    <div class="w-full h-full rounded-full bg-[#050505] flex items-center justify-center overflow-hidden border-4 border-[#050505] relative">
                        <img id="profile-img" src="" alt="" class="w-full h-full object-cover hidden" referrerPolicy="no-referrer">
                        <i id="profile-icon" data-lucide="music" class="w-10 h-10 text-white/80"></i>
                    </div>
                </div>
                <div class="absolute -inset-2 border border-dashed border-white/10 rounded-full pointer-events-none animate-rotate"></div>
            </div>
            
            <h1 class="text-3xl font-bold tracking-tighter mb-2">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">こっぺん すりーぴー</span>
            </h1>
            <p class="text-white/50 text-sm font-medium tracking-widest uppercase">
                DJ ( 声優 / アイドル )
            </p>
        </header>

        <!-- Links Section -->
        <div id="links" class="space-y-4">
            <!-- Link 1 -->
            <a href="https://x.com/koppen_sleepy_d" target="_blank" rel="noopener noreferrer" class="slide-in group relative block p-4 rounded-2xl bg-white/5 border border-white/10 hover:border-white/20 transition-all duration-300 active:scale-[0.98]">
                <div class="absolute inset-0 bg-gradient-to-r from-purple-500 to-blue-500 opacity-0 group-hover:opacity-5 transition-opacity duration-300 rounded-2xl"></div>
                <div class="flex items-center gap-4">
                    <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center text-white shadow-lg shadow-black/20">
                        <i data-lucide="disc" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-0.5">
                            <h2 class="text-sm font-bold text-white/90 truncate">こっぺん すりーぴー</h2>
                            <i data-lucide="external-link" class="w-3 h-3 text-white/30 group-hover:text-white/60 transition-colors"></i>
                        </div>
                        <p class="text-xs text-white/40 truncate">DJ活動・出演情報はこちら</p>
                    </div>
                </div>
            </a>

            <!-- Link 2 -->
            <a href="https://x.com/koppen_sleepy" target="_blank" rel="noopener noreferrer" class="slide-in group relative block p-4 rounded-2xl bg-white/5 border border-white/10 hover:border-white/20 transition-all duration-300 active:scale-[0.98]">
                <div class="absolute inset-0 bg-gradient-to-r from-emerald-500 to-teal-500 opacity-0 group-hover:opacity-5 transition-opacity duration-300 rounded-2xl"></div>
                <div class="flex items-center gap-4">
                    <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-500 flex items-center justify-center text-white shadow-lg shadow-black/20">
                        <i data-lucide="message-circle" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-0.5">
                            <h2 class="text-sm font-bold text-white/90 truncate">こっぺん</h2>
                            <i data-lucide="external-link" class="w-3 h-3 text-white/30 group-hover:text-white/60 transition-colors"></i>
                        </div>
                        <p class="text-xs text-white/40 truncate">日常・雑談・アニメの実況など</p>
                    </div>
                </div>
            </a>

            <!-- Link 3 -->
            <a href="https://x.com/AsvGuild" target="_blank" rel="noopener noreferrer" class="slide-in group relative block p-4 rounded-2xl bg-white/5 border border-white/10 hover:border-white/20 transition-all duration-300 active:scale-[0.98]">
                <div class="absolute inset-0 bg-gradient-to-r from-orange-500 to-red-500 opacity-0 group-hover:opacity-5 transition-opacity duration-300 rounded-2xl"></div>
                <div class="flex items-center gap-4">
                    <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center text-white shadow-lg shadow-black/20">
                        <i data-lucide="users" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-0.5">
                            <h2 class="text-sm font-bold text-white/90 truncate">ASV-Guild</h2>
                            <i data-lucide="external-link" class="w-3 h-3 text-white/30 group-hover:text-white/60 transition-colors"></i>
                        </div>
                        <p class="text-xs text-white/40 truncate">所属イベント ASV-Guild 公式アカウント</p>
                    </div>
                </div>
            </a>

            <!-- Link 4 -->
            <a href="https://x.com/stagea_night" target="_blank" rel="noopener noreferrer" class="slide-in group relative block p-4 rounded-2xl bg-white/5 border border-white/10 hover:border-white/20 transition-all duration-300 active:scale-[0.98]">
                <div class="absolute inset-0 bg-gradient-to-r from-pink-500 to-rose-500 opacity-0 group-hover:opacity-5 transition-opacity duration-300 rounded-2xl"></div>
                <div class="flex items-center gap-4">
                    <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-gradient-to-br from-pink-500 to-rose-500 flex items-center justify-center text-white shadow-lg shadow-black/20">
                        <i data-lucide="users" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-0.5">
                            <h2 class="text-sm font-bold text-white/90 truncate">ステージアナイト</h2>
                            <i data-lucide="external-link" class="w-3 h-3 text-white/30 group-hover:text-white/60 transition-colors"></i>
                        </div>
                        <p class="text-xs text-white/40 truncate">所属イベント ステージアナイト 公式アカウント</p>
                    </div>
                </div>
            </a>
        </div>
    </main>

    <!-- Decorative Elements -->
    <div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-black to-transparent pointer-events-none"></div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Icon Change Logic
        const iconContainer = document.getElementById('icon-container');
        const iconInput = document.getElementById('icon-input');
        const profileImg = document.getElementById('profile-img');
        const profileIcon = document.getElementById('profile-icon');

        // Load icon
        function loadProfile() {
            const profileImg = document.getElementById('profile-img');
            const profileIcon = document.getElementById('profile-icon');
            
            // Default path for GitHub Pages / Static hosting
            const defaultPath = './src/profile.png';
            
            const img = new Image();
            img.onload = function() {
                profileImg.src = defaultPath + '?t=' + new Date().getTime();
                profileImg.classList.remove('hidden');
                profileIcon.classList.add('hidden');
            };
            img.onerror = function() {
                // If profile.png doesn't exist, show the default icon
                profileImg.classList.add('hidden');
                profileIcon.classList.remove('hidden');
            };
            img.src = defaultPath;
        }
        loadProfile();

        // Simple animation trigger
        window.addEventListener('DOMContentLoaded', () => {
            // Header animation
            setTimeout(() => {
                document.getElementById('header').classList.add('visible');
            }, 100);

            // Links animation
            const links = document.querySelectorAll('.slide-in');
            links.forEach((link, index) => {
                setTimeout(() => {
                    link.classList.add('visible');
                }, 300 + (index * 100));
            });
        });
    </script>
</body>
</html>
